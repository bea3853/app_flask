<h1>Usuários</h1>

<ul>
{% for u in users %}
  <li>
    {{u["name"]}}
    <a href="/delete/{{u['id']}}">Excluir</a>
    <a href="/edit/{{u['id']}}">Editar</a>
  </li>
{% endfor %}
</ul>

<form method="POST" action="/add">
  <input name="name" placeholder="Nome">
  <button>Adicionar</button>
</form>
